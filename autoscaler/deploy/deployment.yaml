---
# ─────────────────────────────────────────────────────────────────────────────
# Deployment — Intelligent Kubernetes Node Autoscaler
#
# Runs inside the cluster (kube-system) using in-cluster service-account
# credentials.  The controller calls `docker` CLI for Kind node provisioning,
# so the Docker socket from the host is mounted read-write.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuber-scale-autoscaler
  namespace: kube-system
  labels:
    app.kubernetes.io/name: kuber-scale-autoscaler
    app.kubernetes.io/component: autoscaler
    app.kubernetes.io/version: "0.1.0"
spec:
  # Single replica — the controller is not HA by default.
  # For HA add leader election (future work).
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kuber-scale-autoscaler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kuber-scale-autoscaler
        app.kubernetes.io/component: autoscaler
    spec:
      serviceAccountName: kuber-scale-autoscaler

      # system-cluster-critical ensures the autoscaler is not itself evicted
      # when the cluster is under pressure.
      priorityClassName: system-cluster-critical

      # Allow placement on control-plane nodes in a Kind cluster.
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"

      # Prefer the control-plane node so the autoscaler is always reachable
      # even while worker nodes are being cycled.
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""

      volumes:
        # Docker socket — required by the Kind node provisioner which calls
        # `docker run`, `docker exec`, and `docker rm` via the CLI.
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket

      containers:
        - name: autoscaler
          # Build locally and load into Kind with:
          #   docker build -t kuber-scale/autoscaler:latest .
          #   kind load docker-image kuber-scale/autoscaler:latest
          image: kuber-scale/autoscaler:latest

          # Never pull from a registry — image is loaded directly into Kind.
          imagePullPolicy: Never

          # No --kubeconfig flag → uses in-cluster service-account token.
          command: ["/autoscaler"]

          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock

          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          # Liveness: check that the process is still running.
          # Uses /proc/1/status which is always present in Linux containers,
          # even in distroless images (no shell required).
          livenessProbe:
            exec:
              command:
                - cat
                - /proc/1/status
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          # Readiness: same check — considered ready once the process is alive.
          readinessProbe:
            exec:
              command:
                - cat
                - /proc/1/status
            initialDelaySeconds: 5
            periodSeconds: 10

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: false   # Must be root to talk to Docker socket
            capabilities:
              drop: ["ALL"]

      terminationGracePeriodSeconds: 30
